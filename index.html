<!doctype html>
<html lang="es-419">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport & Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2c1e14" />

    <!-- SEO Principal -->
    <title>Oasis Café — Café de Especialidad, Tortas y Cursos de Barismo</title>

    <meta name="keywords" content="café de especialidad, café artesanal, tortas personalizadas, cursos de barismo, catering eventos, café, barista, repostería artesanal" />
    <meta name="author" content="Oasis Café" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://oasiscafe.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://oasiscafe.com/" />
    <meta property="og:title" content="Oasis Café — Café de Especialidad y Tortas Artesanales" />
    <meta property="og:description" content="Descubre nuestro menú de cafés de autor, tortas personalizadas para bodas y cumpleaños, catering de eventos y cursos de barismo certificados." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1200&q=80" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_LA" />
    <meta property="og:site_name" content="Oasis Café" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Oasis Café — Café de Especialidad y Tortas Artesanales" />
    <meta name="twitter:description" content="Café de autor, tortas personalizadas y cursos de barismo. Tu rincón favorito de la ciudad." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1200&q=80" />

    <!-- Seguridad HTTP via Meta -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https://images.unsplash.com https://plus.unsplash.com;
      connect-src 'self';
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
    " />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Preconnect para performance -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- JSON-LD Structured Data (Local Business) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CafeOrCoffeeShop",
      "name": "Oasis Café",
      "description": "Café de especialidad con tortas personalizadas, catering y cursos de barismo.",

      "logo": "https://oasiscafe.com/favicon.svg",

      "telephone": "+54-11-1234-5678",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Av. de los Cafetales 1234",
        "addressLocality": "Barrio Central",
        "addressCountry": "AR"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
        "opens": "07:00",
        "closes": "21:00"
      },
      "sameAs": [
        "https://instagram.com/OasisCafe",
        "https://facebook.com/OasisCafe"
      ],

    }
